# =============================================================
# application.yml
# TallerAPI - Configuración base
#
# Configuración común a todos los perfiles. Los valores sensibles
# (credenciales de BD, secreto JWT) se parametrizan SIEMPRE mediante
# variables de entorno, nunca con valores hardcodeados, tal y como
# exige el apartado 6.1 del documento de requisitos.
#
# El perfil activo se selecciona con la variable de entorno
# SPRING_PROFILES_ACTIVE (por defecto: dev).
# =============================================================

spring:
  application:
    name: tallerapi

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tallerapi}
    username: ${DB_USERNAME:tallerapi}
    password: ${DB_PASSWORD:tallerapi}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway gestiona el esquema; Hibernate solo valida que las
    # entidades coincidan con las tablas creadas por las migraciones.
    # Esto evita el riesgo de ddl-auto=update/create en producción
    # (ver fase1-notas-tecnicas.md).
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Configuración JWT (dependencia añadida en Fase 1, uso real en Fase 2)
app:
  jwt:
    secret: ${JWT_SECRET:cambia-este-secreto-en-produccion-por-uno-largo-y-aleatorio}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

# springdoc-openapi: ruta de la documentación interactiva
springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# -------------------------------------------------------------
# Perfil: dev
# -------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.delamaderaalcodigo.tallerapi: DEBUG
    org.hibernate.SQL: DEBUG

---
# -------------------------------------------------------------
# Perfil: prod
# -------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    com.delamaderaalcodigo.tallerapi: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never